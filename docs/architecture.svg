<rect x="60" y="856" width="162" height="42" rx="6" fill="#1A1E27" stroke="#444441" stroke-width="0.5"/>
<text x="70" y="871" font-size="9" font-weight="500" fill="#7A8099" letter-spacing="0.06em">PERFORMANCE</text>
<rect x="70" y="876" width="6" height="6" rx="1" fill="#4F8EF7"/>
<text x="80" y="883" font-size="9" fill="#7A8099">Latency: &lt;2 minutes</text>
<rect x="70" y="886" width="6" height="6" rx="1" fill="#22C55E"/>
<text x="80" y="893" font-size="9" fill="#7A8099">Throughput: 10K+ orders/min</text>

<!-- Right legend -->
<rect x="578" y="856" width="162" height="42" rx="6" fill="#1A1E27" stroke="#444441" stroke-width="0.5"/>
<text x="588" y="871" font-size="9" font-weight="500" fill="#7A8099" letter-spacing="0.06em">LAYERS</text>
<rect x="588" y="876" width="6" height="6" rx="1" fill="#EF9F27"/>
<text x="598" y="883" font-size="9" fill="#7A8099">Bronze</text>
<rect x="640" y="876" width="6" height="6" rx="1" fill="#22C55E"/>
<text x="650" y="883" font-size="9" fill="#7A8099">Silver</text>
<rect x="588" y="886" width="6" height="6" rx="1" fill="#7F77DD"/>
<text x="598" y="893" font-size="9" fill="#7A8099">Gold</text>
<rect x="640" y="886" width="6" height="6" rx="1" fill="#EF4444"/>
<text x="650" y="893" font-size="9" fill="#7A8099">Dead letter</text>

