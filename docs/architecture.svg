<svg width="800" height="980" viewBox="0 0 800 980" xmlns="http://www.w3.org/2000/svg" style="background:#0D0F14;font-family:Inter,Arial,sans-serif;">
<title>ShopStream Real-Time E-Commerce Order Tracking Pipeline Architecture</title>
<desc>Full end-to-end architecture: Python order event simulator sends to Azure Event Hubs, Databricks Structured Streaming processes through Bronze Silver Gold Delta Lake medallion layers to a live dashboard.</desc>

<!-- Title -->
<rect x="0" y="0" width="800" height="52" fill="#13161D"/>
<text x="400" y="20" text-anchor="middle" font-size="15" font-weight="600" fill="#E8EAF0" dy="10">ShopStream — Real-Time E-Commerce Order Tracking Pipeline</text>
<text x="400" y="40" text-anchor="middle" font-size="11" fill="#7A8099">Azure Event Hubs · Databricks Structured Streaming · Delta Lake · Medallion Architecture</text>

<!-- Azure region -->
<rect x="60" y="170" width="680" height="88" rx="10" fill="#0C447C" fill-opacity="0.12" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="6 3"/>
<text x="78" y="188" font-size="10" font-weight="500" fill="#4F8EF7" letter-spacing="0.08em">AZURE CLOUD</text>

<!-- Databricks region -->
<rect x="60" y="296" width="680" height="540" rx="10" fill="#633806" fill-opacity="0.07" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="6 3"/>
<text x="78" y="314" font-size="10" font-weight="500" fill="#F59E0B" letter-spacing="0.08em">DATABRICKS WORKSPACE</text>

<!-- PRODUCER -->
<rect x="280" y="72" width="240" height="66" rx="10" fill="#1A1E27" stroke="#444441" stroke-width="0.8"/>
<rect x="280" y="72" width="240" height="4" rx="2" fill="#7A8099"/>
<text x="400" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">Order Event Simulator</text>
<text x="400" y="121" text-anchor="middle" font-size="11" fill="#7A8099">Python · 100 orders/sec · Azure Free Tier</text>
<text x="400" y="134" text-anchor="middle" font-size="10" fill="#5F5E5A">order_id · customer_id · category · order_value · status</text>

<!-- arrow producer → EH -->
<line x1="400" y1="138" x2="400" y2="178" stroke="#7A8099" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="412" y="161" font-size="9" fill="#7A8099">JSON events</text>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>

<!-- EVENT HUBS -->
<rect x="220" y="180" width="360" height="64" rx="10" fill="#0C447C" fill-opacity="0.25" stroke="#185FA5" stroke-width="0.8"/>
<rect x="220" y="180" width="360" height="4" rx="2" fill="#4F8EF7"/>
<text x="400" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">Azure Event Hubs</text>
<text x="400" y="226" text-anchor="middle" font-size="11" fill="#7A8099">Kafka-compatible · Hub: order-events · 7-day retention</text>
<text x="400" y="240" text-anchor="middle" font-size="10" fill="#4F8EF7">Free tier · Basic SKU · 4 partitions</text>

<!-- arrow EH → Bronze -->
<line x1="400" y1="244" x2="400" y2="326" stroke="#4F8EF7" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="412" y="273" font-size="9" fill="#4F8EF7">readStream</text>
<text x="412" y="285" font-size="9" fill="#4F8EF7">Structured Streaming</text>
<text x="412" y="297" font-size="9" fill="#4F8EF7">60s micro-batch</text>

<!-- BRONZE -->
<rect x="120" y="328" width="560" height="76" rx="10" fill="#633806" fill-opacity="0.22" stroke="#EF9F27" stroke-width="0.8"/>
<rect x="120" y="328" width="560" height="4" rx="2" fill="#EF9F27"/>
<text x="400" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">🥉  Bronze Layer — Raw Ingest</text>
<text x="400" y="374" text-anchor="middle" font-size="11" fill="#7A8099">Exact Event Hubs payload · Append only · Schema-on-read · Exactly-once checkpoint</text>
<text x="400" y="390" text-anchor="middle" font-size="10" fill="#F59E0B">shopstream_db.bronze_order_events (Delta)  ·  checkpoint: /mnt/checkpoints/bronze_orders</text>

<!-- arrow bronze → DQ -->
<line x1="400" y1="404" x2="400" y2="440" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- DQ box -->
<rect x="278" y="443" width="244" height="44" rx="6" fill="#1A1E27" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="5 2"/>
<text x="400" y="461" text-anchor="middle" font-size="11" font-weight="500" fill="#E8EAF0">Data Quality Validation</text>
<text x="400" y="477" text-anchor="middle" font-size="10" fill="#7A8099">Null checks · Value range · Type validation</text>

<!-- valid → Silver -->
<line x1="328" y1="487" x2="216" y2="532" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="244" y="513" text-anchor="middle" font-size="9" fill="#22C55E">valid</text>

<!-- invalid → Dead Letter -->
<line x1="472" y1="487" x2="584" y2="532" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="555" y="513" text-anchor="middle" font-size="9" fill="#EF4444">invalid</text>

<!-- SILVER -->
<rect x="60" y="534" width="310" height="100" rx="10" fill="#085041" fill-opacity="0.25" stroke="#1D9E75" stroke-width="0.8"/>
<rect x="60" y="534" width="310" height="4" rx="2" fill="#22C55E"/>
<text x="215" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">🥈  Silver Layer — Cleaned</text>
<text x="215" y="579" text-anchor="middle" font-size="11" fill="#7A8099">Nulls removed · types cast</text>
<text x="215" y="595" text-anchor="middle" font-size="11" fill="#7A8099">Region/category standardised</text>
<text x="215" y="611" text-anchor="middle" font-size="11" fill="#7A8099">Deduped on order_id + event_ts</text>
<text x="215" y="626" text-anchor="middle" font-size="10" fill="#22C55E">silver_order_events (Delta)</text>

<!-- DEAD LETTER -->
<rect x="430" y="534" width="310" height="100" rx="10" fill="#791F1F" fill-opacity="0.2" stroke="#E24B4A" stroke-width="0.8"/>
<rect x="430" y="534" width="310" height="4" rx="2" fill="#EF4444"/>
<text x="585" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">💀  Dead Letter Table</text>
<text x="585" y="579" text-anchor="middle" font-size="11" fill="#7A8099">Failed validation records</text>
<text x="585" y="595" text-anchor="middle" font-size="11" fill="#7A8099">Stored for investigation</text>
<text x="585" y="611" text-anchor="middle" font-size="11" fill="#7A8099">Never silently dropped</text>
<text x="585" y="626" text-anchor="middle" font-size="10" fill="#EF4444">dead_letter_orders (Delta)</text>

<!-- Silver → Gold -->
<line x1="215" y1="634" x2="215" y2="670" stroke="#22C55E" stroke-width="1.5"/>
<line x1="215" y1="670" x2="400" y2="670" stroke="#22C55E" stroke-width="1.5"/>
<line x1="400" y1="670" x2="400" y2="696" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="310" y="663" text-anchor="middle" font-size="9" fill="#22C55E">5-min tumbling window · watermark 10min</text>

<!-- GOLD -->
<rect x="120" y="698" width="560" height="100" rx="10" fill="#3C3489" fill-opacity="0.2" stroke="#7F77DD" stroke-width="0.8"/>
<rect x="120" y="698" width="560" height="4" rx="2" fill="#7F77DD"/>
<text x="400" y="726" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">🥇  Gold Layer — Business KPIs</text>
<text x="400" y="743" text-anchor="middle" font-size="11" fill="#7A8099">Total orders · Revenue · Unique customers · Avg order value</text>
<text x="400" y="759" text-anchor="middle" font-size="11" fill="#7A8099">Cancellation rate % · Return rate % · Delivery rate % · Units sold</text>
<text x="400" y="775" text-anchor="middle" font-size="11" fill="#7A8099">Grouped by: region + category · Output mode: update</text>
<text x="400" y="791" text-anchor="middle" font-size="10" fill="#AFA9EC">shopstream_db.gold_order_kpis (Delta)  ·  checkpoint: /mnt/checkpoints/gold_orders</text>

<!-- Gold → Dashboard -->
<line x1="400" y1="798" x2="400" y2="834" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- DASHBOARD -->
<rect x="250" y="836" width="300" height="66" rx="10" fill="#1A1E27" stroke="#444441" stroke-width="0.8"/>
<rect x="250" y="836" width="300" height="4" rx="2" fill="#7A8099"/>
<text x="400" y="864" text-anchor="middle" font-size="13" font-weight="600" fill="#E8EAF0">📊  Databricks SQL Dashboard</text>
<text x="400" y="881" text-anchor="middle" font-size="11" fill="#7A8099">Live revenue · Order volume · Cancellation alerts</text>
<text x="400" y="896" text-anchor="middle" font-size="10" fill="#5F5E5A">Return trends · Customer activity · Region heatmap</text>

